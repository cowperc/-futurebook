<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Selection - 未來之書</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ff88;
            --secondary: #ffd700;
            --dark: #0a0a1a;
            --darker: #050510;
            --light: #ffffff;
        }
        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: var(--darker);
            color: var(--light);
            line-height: 1.8;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: var(--secondary); margin-bottom: 20px; text-align: center; }
        .back-link { color: var(--primary); text-decoration: none; font-size: 16px; }
        .content { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; margin-top: 20px; }
        .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin: 20px 0; }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--primary);
            color: var(--light);
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }
        .lang-btn:hover { background: var(--primary); color: var(--dark); transform: scale(1.05); }
        .lang-code { font-size: 24px; font-weight: bold; }
        .lang-name { font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首頁 / Back</a>
        
        <h1>🌐 Language Selection</h1>
        
        <div class="content">
            <div class="lang-grid">
                <a href="index.html?lang=zh-TW" class="lang-btn">
                    <div class="lang-code">🇹🇼</div>
                    <div class="lang-name">繁體中文</div>
                </a>
                <a href="index.html?lang=zh-CN" class="lang-btn">
                    <div class="lang-code">🇨🇳</div>
                    <div class="lang-name">简体中文</div>
                </a>
                <a href="index.html?lang=en" class="lang-btn">
                    <div class="lang-code">🇺🇸</div>
                    <div class="lang-name">English</div>
                </a>
                <a href="index.html?lang=ja" class="lang-btn">
                    <div class="lang-code">🇯🇵</div>
                    <div class="lang-name">日本語</div>
                </a>
                <a href="index.html?lang=ko" class="lang-btn">
                    <div class="lang-code">🇰🇷</div>
                    <div class="lang-name">한국어</div>
                </a>
                <a href="index.html?lang=es" class="lang-btn">
                    <div class="lang-code">🇪🇸</div>
                    <div class="lang-name">Español</div>
                </a>
                <a href="index.html?lang=fr" class="lang-btn">
                    <div class="lang-code">🇫🇷</div>
                    <div class="lang-name">Français</div>
                </a>
                <a href="index.html?lang=de" class="lang-btn">
                    <div class="lang-code">🇩🇪</div>
                    <div class="lang-name">Deutsch</div>
                </a>
                <a href="index.html?lang=pt" class="lang-btn">
                    <div class="lang-code">🇧🇷</div>
                    <div class="lang-name">Português</div>
                </a>
                <a href="index.html?lang=ru" class="lang-btn">
                    <div class="lang-code">🇷🇺</div>
                    <div class="lang-name">Русский</div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
