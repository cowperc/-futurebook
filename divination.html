<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 金錢卦占卜 - 未來之書</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ff88;
            --secondary: #ffd700;
            --dark: #0a0a1a;
            --darker: #050510;
            --light: #ffffff;
            --gray: #888;
        }
        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: var(--darker);
            color: var(--light);
            line-height: 1.8;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--gray); margin-bottom: 30px; }
        
        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 16px;
        }
        .back-link:hover { text-decoration: underline; }
        
        .divination-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            text-align: center;
            border: 2px solid var(--primary);
        }
        
        .coins-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .coin {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
            transition: transform 0.5s;
        }
        
        .coin.flip {
            animation: flipCoin 0.5s ease-out;
        }
        
        @keyframes flipCoin {
            0% { transform: rotateY(0); }
            50% { transform: rotateY(720deg); }
            100% { transform: rotateY(0); }
        }
        
        .coin.yang { background: linear-gradient(135deg, #ffd700, #ffaa00); }
        .coin.yin { background: linear-gradient(135deg, #888, #555); }
        
        .result-line {
            font-size: 24px;
            margin: 10px 0;
            color: var(--secondary);
        }
        
        .line-info {
            font-size: 16px;
            color: var(--gray);
            margin: 5px 0;
        }
        
        .btn {
            background: linear-gradient(45deg, var(--primary), #00cc66);
            color: var(--dark);
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
        }
        
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hexagram-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .hex-line {
            width: 60px;
            height: 30px;
            background: var(--primary);
            border-radius: 5px;
            position: relative;
        }
        
        .hex-line.broken::before,
        .hex-line.broken::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 6px;
            background: var(--primary);
            top: 50%;
            transform: translateY(-50%);
        }
        
        .hex-line.broken::before { left: 0; }
        .hex-line.broken::after { right: 0; }
        
        .hex-line.old {
            background: var(--secondary);
            animation: glow 1s infinite;
        }
        
        .hex-line.old.broken::before,
        .hex-line.old.broken::after {
            background: var(--secondary);
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px var(--secondary); }
            50% { box-shadow: 0 0 25px var(--secondary); }
        }
        
        .result-section {
            text-align: left;
            margin-top: 40px;
        }
        
        .result-section h3 {
            color: var(--secondary);
            margin: 20px 0 10px;
        }
        
        .result-section p {
            color: var(--gray);
            margin: 10px 0;
        }
        
        .interpretation {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid var(--primary);
        }
        
        .interpretation strong {
            color: var(--primary);
        }
        
        .yuan-note {
            font-size: 14px;
            color: var(--gray);
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gray);
            opacity: 0.3;
        }
        
        .step-dot.active {
            background: var(--primary);
            opacity: 1;
        }
        
        .step-dot.done {
            background: var(--primary);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首頁</a>
        
        <h1>🔮 金錢卦占卜</h1>
        <p class="subtitle">傳統六爻占卜 - 擲三枚銅錢六次</p>
        
        <div class="divination-box" id="startBox">
            <h2 style="margin-bottom: 20px;">誠心念出您想占問的事</h2>
            <p style="color: var(--gray); margin-bottom: 20px;">例如：我的事業運勢如何？</p>
            <input type="text" id="question" placeholder="請輸入您的問題..." 
                   style="width: 100%; max-width: 400px; padding: 15px; border-radius: 10px; 
                          border: 2px solid var(--primary); background: var(--dark); 
                          color: var(--light); font-size: 16px; text-align: center;">
            <br>
            <button class="btn" onclick="startDivination()">開始擲杯 🥌</button>
        </div>
        
        <div class="divination-box" id="tossBox" style="display: none;">
            <h2 id="stepTitle">第 <span id="stepNum">1</span> 交 (共6次)</h2>
            <p style="color: var(--gray); margin-bottom: 20px;">擲出三枚銅錢</p>
            
            <div class="coins-area">
                <div class="coin" id="coin1"></div>
                <div class="coin" id="coin2"></div>
                <div class="coin" id="coin3"></div>
            </div>
            
            <button class="btn" onclick="tossCoins()">擲幣 🎲</button>
            
            <div class="step-indicator">
                <div class="step-dot" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
                <div class="step-dot" id="dot3"></div>
                <div class="step-dot" id="dot4"></div>
                <div class="step-dot" id="dot5"></div>
                <div class="step-dot" id="dot6"></div>
            </div>
        </div>
        
        <div class="divination-box" id="resultBox" style="display: none;">
            <h2>🏆 占卜結果</h2>
            <p class="subtitle" id="questionResult"></p>
            
            <div class="hexagram-display" id="benua"></div>
            <p style="color: var(--gray);">本卦</p>
            
            <div class="hexagram-display" id="biangua" style="margin-top: 20px;"></div>
            <p style="color: var(--gray);">變卦</p>
            
            <div class="interpretation" id="benuaInterpretation"></div>
            <div class="interpretation" id="bianguaInterpretation" style="display: none;"></div>
            
            <div class=" yuan-note">
                <strong>六爻說明：</strong><br>
                🟡 老陽(9) - 變為陰爻 | ⚪ 少陽(7) - 不變<br>
                ⚫ 老陰(6) - 變為陽爻 | 🔵 少陰(8) - 不變<br><br>
                <em>注：本占卜僅供娛樂參考，請勿過度迷信。</em>
            </div>
            
            <button class="btn" onclick="reset()">再次占卜 🔄</button>
        </div>
    </div>

    <script>
        const hexagramNames = [
            '坤為地', '山地剝', '水地比', '風地觀', '雷地豫', '火地晉', '澤水困', '天山遯',
            '天地否', '風天小畜', '火天大有', '雷天大壯', '澤天夬', '水天需', '山天大畜', '震為雷',
            '地澤臨', '山損', '水澤節', '風澤中孚', '雷澤歸妹', '火澤睽', '天山旅', '澤天夬',
            '地天泰', '山澤損', '水澤咸', '風天小畜', '雷水解', '火同人', '澤天夬', '天山遯',
            '雷天大壯', '火天大有', '風天小畜', '水天需', '山天大畜', '澤天夬', '天山遯', '澤雷隨',
            '山風蠱', '木剝', '水渙', '風漸', '雷山小過', '火山旅', '澤天夬', '天山遯',
            '天風姤', '天山遯', '風天小畜', '火天大有', '雷天大壯', '澤天夬', '天山遯', '澤天夬',
            '澤天夬', '天山遯', '風天小畜', '火天大有', '雷天大壯', '天山遯', '天山遯', '乾為天'
        ];
        
        const lineNames = ['初', '二', '三', '四', '五', '上'];
        
        let question = '';
        let lines = [];
        let currentStep = 0;
        
        function startDivination() {
            question = document.getElementById('question').value.trim();
            if (!question) {
                alert('請先輸入您想占問的問題');
                return;
            }
            document.getElementById('startBox').style.display = 'none';
            document.getElementById('tossBox').style.display = 'block';
            currentStep = 0;
            lines = [];
        }
        
        function tossCoins() {
            const coins = [Math.random() > 0.5 ? 1 : 0, 
                        Math.random() > 0.5 ? 1 : 0, 
                        Math.random() > 0.5 ? 1 : 0];
            
            const heads = coins.reduce((a, b) => a + b, 0);
            let value;
            
            coinElements = ['coin1', 'coin2', 'coin3'];
            coinElements.forEach(id => {
                const el = document.getElementById(id);
                el.classList.add('flip');
                el.classList.remove('yang', 'yin');
                el.textContent = '';
            });
            
            setTimeout(() => {
                coinElements.forEach((id, i) => {
                    const el = document.getElementById(id);
                    el.classList.remove('flip');
                    if (coins[i] === 1) {
                        el.classList.add('yang');
                        el.textContent = '字';
                    } else {
                        el.classList.add('yin');
                        el.textContent = '，背';
                    }
                });
                
                if (heads === 3) value = 9;
                else if (heads === 2) value = 7;
                else if (heads === 1) value = 8;
                else value = 6;
                
                lines.push(value);
                currentStep++;
                
                document.getElementById('stepNum').textContent = currentStep;
                
                for (let i = 1; i <= 6; i++) {
                    const dot = document.getElementById('dot' + i);
                    if (i < currentStep) dot.className = 'step-dot done';
                    else if (i === currentStep) dot.className = 'step-dot active';
                    else dot.className = 'step-dot';
                }
                
                if (currentStep >= 6) {
                    setTimeout(showResult, 1000);
                }
            }, 500);
        }
        
        function showResult() {
            document.getElementById('tossBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('questionResult').textContent = '問：' + question;
            
            let benua = 0;
            let biangua = 0;
            
            for (let i = 0; i < 6; i++) {
                const line = lines[i];
                const bit = (line === 7 || line === 9) ? 1 : 0;
                benua = benua | (bit << i);
                if (line === 6) biangua = biangua | (1 << i);
                else if (line === 9) biangua = biangua | (0 << i);
                else biangua = biangua | (bit << i);
            }
            
            const benuaName = hexagramNames[benua] || '未命名';
            const bianguaName = hexagramNames[biangua] || '未命名';
            
            let benuaHtml = '';
            let bianguaHtml = '';
            
            for (let i = 0; i < 6; i++) {
                const line = lines[i];
                const isYang = (line === 7 || line === 9);
                const isOld = (line === 6 || line === 9);
                const isBroken = !isYang;
                
                let lineClass = 'hex-line';
                if (isBroken) lineClass += ' broken';
                if (isOld) lineClass += ' old';
                
                benuaHtml += `<div class="${lineClass}"></div>`;
                
                let biangLine = line;
                if (line === 6) biangLine = 7;
                else if (line === 9) biangLine = 8;
                
                const biIsYang = (biangLine === 7 || biangLine === 9);
                const biIsBroken = !biIsYang;
                
                let biClass = 'hex-line';
                if (biIsBroken) biClass += ' broken';
                bianguaHtml += `<div class="${biClass}"></div>`;
            }
            
            document.getElementById('benua').innerHTML = benuaHtml;
            document.getElementById('biangua').innerHTML = bianguaHtml;
            
            const interpretations = {
                career: { ben: '事業發展順利`，將獲得貴人相助`，宜積極進取。', bi: '如遇變卦`，表示需要調整策略', love: { ben: '感情運勢穩定`，有穩定的對象或桃花運。', bi: '若有變卦`，感情有變化需注意。', money: { ben: '財運普通`，宜靜待時機`，不宜冒進。', bi: '如有變卦`，表示財運將有轉機。' }
            };
            
            const isBigQuestion = question.includes('事業') || question.includes('工作');
            const isLoveQuestion = question.includes('愛情') || question.includes('感情') || question.includes('桃花');
            const isMoneyQuestion = question.includes('財') || question.includes('錢');
            
            let type = 'career';
            if (isLoveQuestion) type = 'love';
            else if (isMoneyQuestion) type = 'money';
            
            const intData = interpretations[type];
            const hasChange = lines.some(l => l === 6 || l === 9);
            
            let benuaText = `<strong>本卦 ${benuaName}</strong><br>${intData.ben}`;
            for (let i = 0; i < 6; i++) {
                const line = lines[i];
                if (line === 6 || line === 9) {
                    const pos = lineNames[i];
                    const nature = (line === 6) ? '老陰' : '老陽';
                    const change = (line === 6) ? '變為陽爻' : '變為陰爻';
                    benuaText += `<br>${pos}爻為${nature}，將${change}`;
                }
            }
            
            let bianguaText = '';
            if (hasChange) {
                bianguaText = `<strong>變卦 ${bianguaName}</strong><br>${intData.bi}`;
                document.getElementById('bianguaInterpretation').style.display = 'block';
            } else {
                document.getElementById('bianguaInterpretation').style.display = 'none';
            }
            
            document.getElementById('benuaInterpretation').innerHTML = benuaText;
            document.getElementById('bianguaInterpretation').innerHTML = bianguaText;
        }
        
        function reset() {
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('startBox').style.display = 'block';
            document.getElementById('question').value = '';
            lines = [];
            currentStep = 0;
        }
    </script>
</body>
</html>
