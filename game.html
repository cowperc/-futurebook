<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>純素救地球</title>
    <style>
        body{font-family:sans-serif;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;margin:0;padding:20px}
        h1{color:#4ade80}
        #s{display:flex;gap:20px;font-size:20px;margin-bottom:20px}
        .st{background:rgba(255,255,255,.1);padding:10px 20px;border-radius:10px}
        #g{width:100%;max-width:500px;height:400px;background:rgba(0,0,0,.3);border-radius:15px;position:relative;overflow:hidden;cursor:crosshair;border:2px solid #4ade80}
        #e{position:absolute;width:60px;height:60px;background:#4ade80;border-radius:50%;top:10px;left:50%;transform:translateX(-50%);box-shadow:0 0 20px #4ade80}
        #e.d{background:#ef4444;box-shadow:0 0 20px #ef4444;animation:sh .2s infinite}
        @keyframes sh{0%,100%{transform:translateX(-50%) rotate(0)}25%{transform:translateX(-52%) rotate(-3deg)}75%{transform:translateX(-48%) rotate(3deg)}}
        #m{position:absolute;font-size:35px;pointer-events:none;transform:translate(-50%,-50%)}
        .f{position:absolute;font-size:30px;animation:fa 2.5s linear forwards}
        @keyframes fa{from{top:-30px}to{top:420px}}
        .v{color:#4ade80}
        .n{color:#ef4444}
        #st,#en{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:10}
        #en{display:none}
        button{background:#4ade80;color:#1a1a2e;border:none;padding:12px 30px;font-size:18px;border-radius:25px;font-weight:bold;cursor:pointer}
        button:hover{transform:scale(1.05)}
    </style>
</head>
<body>
    <h1>🌍 純素救地球</h1>
    <div id="s"><div class="st">分:<span id="sc">0</span></div><div class="st">時:<span id="tm">60</span></div></div>
    <div id="g"><div id="e"></div><div id="m">👄</div>
        <div id="st"><h2>吃純素救地球!</h2><p>🥬🥕🍎=素 ✅ | 🍖🥩🥗=肉 ❌</p><button onclick="play()">開始</button></div>
        <div id="en"><h2 style="color:#ef4444">💥地球爆炸!</h2><p>分數:<span id="fs">0</span></p><button onclick="play()">再試</button></div>
    </div>
    <script>
        const v=['🥬','🥕','🍎','🍇','🥑','🍊','🍓','🍌','🥦','🍒','🥝','🫐'],n=['🍖','🍗','🥩','🐟','🦐','🦞','🦀','🐓','🦆','🐑','🐄','🐖'];
        let sc=0,tm=60,run=false,gi,fi;
        const g=document.getElementById('g'),e=document.getElementById('e'),m=document.getElementById('m');
        g.onmousemove=e=>{m.style.left=(e.clientX-g.getBoundingClientRect().left)+'px';m.style.top=(e.clientY-g.getBoundingClientRect().top)+'px'};
        g.onclick=e=>{if(!run)return;const x=e.clientX-g.getBoundingClientRect().left,y=e.clientY-g.getBoundingClientRect().top;document.querySelectorAll('.f').forEach(f=>{const d=Math.hypot(x-parseFloat(f.style.left)-15,y-parseFloat(f.style.top)-15);if(d<35)eat(f)})};
        function play(){sc=0;tm=60;run=true;document.getElementById('sc').innerText=0;document.getElementById('tm').innerText=60;document.getElementById('st').style.display='none';document.getElementById('en').style.display='none';e.classList.remove('d');document.querySelectorAll('.f').forEach(f=>f.remove());clearInterval(gi);clearInterval(fi);gi=setInterval(()=>{tm--;document.getElementById('tm').innerText=tm;if(tm<=10)e.classList.add('d');if(tm<=0)end()},1000);fi=setInterval(spawn,700)}
        function spawn(){if(!run)return;const f=document.createElement('div');f.className='f '+(Math.random()>.4?'v':'n');f.textContent=(Math.random()>.4?v:n)[Math.floor(Math.random()*12)];f.style.left=Math.random()*(g.offsetWidth-40)+'px';g.appendChild(f);f.onanimationend=()=>f.remove()}
        function eat(f){sc+=(f.classList.contains('v')?10:-20);sc=Math.max(0,sc);document.getElementById('sc').innerText=sc;m.textContent=f.classList.contains('v')?'😋':'🤮';setTimeout(()=>m.textContent='👄',200);if(!f.classList.contains('v')){e.classList.add('d');setTimeout(()=>e.classList.remove('d'),400)}f.remove()}
        function end(){run=false;clearInterval(gi);clearInterval(fi);document.getElementById('fs').innerText=sc;document.getElementById('en').style.display='flex'}
    </script>
</body>
</html>
