        <div id="start-screen">

            <p style="margin: 20px; text-align: center;">
                вЬЕ иФђиПЬж∞іжЮЬпЉЪрЯ•ђрЯ•ХрЯНОрЯНЗрЯ•СрЯ•¶<br>
                вЭМ иВЙй°ЮпЉЪрЯНЦрЯНЧрЯ•©рЯРЯрЯ¶Р

            <p style="margin: 20px;">жЬАзµВеИЖжХЄ: <span id="final-score" style="color: var(--primary); font-size: 30px;">0</span></p>
            <button onclick="startGame()">еЖНи©¶дЄАжђ° рЯФД</button>

    <script>
        const veganFoods = ['рЯ•ђ', 'рЯ•Х', 'рЯНО', 'рЯНЗ', 'рЯ•С', 'рЯНК', 'рЯНУ', 'рЯНМ', 'рЯ•¶', 'рЯНТ', 'рЯ•Э', 'рЯЂР', 'рЯНС', 'рЯНР', 'рЯІЕ', 'рЯНЖ', 'рЯІД', 'рЯМґпЄП', 'рЯ•Т', 'рЯМљ'];
        const meatFoods = ['рЯНЦ', 'рЯНЧ', 'рЯ•©', 'рЯРЯ', 'рЯ¶Р', 'рЯ¶Ю', 'рЯ¶А', 'рЯРМ', 'рЯРУ', 'рЯ¶Ж', 'рЯ¶Е', 'рЯРС', 'рЯРР', 'рЯРД', 'рЯРЦ', 'рЯРГ', 'рЯ¶ђ', 'рЯРХ', 'рЯРИ', 'рЯР©'];
        
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let gameInterval, foodInterval;
        
        const container = document.getElementById('game-container');
        const mouth = document.getElementById('mouth');
        const earth = document.getElementById('earth');
        
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            mouth.style.left = x + 'px';
            mouth.style.top = y + 'px';
        });
        
        container.addEventListener('click', (e) => {
            if (!gameRunning) return;
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const foods = document.querySelectorAll('.food');
            foods.forEach(food => {
                const foodRect = food.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const fx = foodRect.left - containerRect.left + 20;
                const fy = foodRect.top - containerRect.top + 20;
                
                const dist = Math.sqrt((x - fx) ** 2 + (y - fy) ** 2);
                if (dist < 40) {
                    eat(food);
                }
            });
        });
        
        function startGame() {
            score = 0;
            timeLeft = 60;
            gameRunning = true;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '60';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            
            const foods = document.querySelectorAll('.food');
            foods.forEach(f => f.remove());
            
            clearInterval(gameInterval);
            clearInterval(foodInterval);
            
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
                if (timeLeft <= 10) {
                    earth.classList.add('danger');
                }
            }, 1000);
            
            foodInterval = setInterval(spawnFood, 800);
        }
        
        function spawnFood() {
            if (!gameRunning) return;
            
            const isVegan = Math.random() > 0.4;
            const foods = isVegan ? veganFoods : meatFoods;
            const food = foods[Math.floor(Math.random() * foods.length)];
            
            const el = document.createElement('div');
            el.className = 'food ' + (isVegan ? 'vegan' : 'meat');
            el.textContent = food;
            el.style.left = Math.random() * (container.offsetWidth - 40) + 'px';
            el.style.animationDuration = (2 + Math.random()) + 's';
            
            container.appendChild(el);
            
            el.addEventListener('animationend', () => el.remove());
        }
        
        function eat(food) {
            const isVegan = food.classList.contains('vegan');
            score += isVegan ? 10 : -20;
            score = Math.max(0, score);
            
            document.getElementById('score').textContent = score;
            
            if (isVegan) {
                mouth.textContent = 'рЯШЛ';
                setTimeout(() => mouth.textContent = 'рЯСД', 200);
            } else {
                mouth.textContent = 'рЯ§Ѓ';
                setTimeout(() => mouth.textContent = 'рЯСД', 200);
                earth.classList.add('danger');
                setTimeout(() => earth.classList.remove('danger'), 500);
            }
            
            food.remove();
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(foodInterval);
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'flex';
            earth.classList.remove('danger');
        }
    </script>
